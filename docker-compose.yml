services:
  postgres:
    image: postgres:15-alpine
    container_name: repolens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
      POSTGRES_DB: repolens
    ports:
      - "5435:5432"
    volumes:
      - repolens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens -d repolens"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  repolens_pgdata:
